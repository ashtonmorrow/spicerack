<title>Flavor Pear — Preview</title>
<style>
  :root {

    --ink: #37352F;
    --muted: #787774;
    --border: #E9E9E7;
    --hover: #F7F6F3;
    --selected: #F1F0EE;
    --pear: #1A7F37;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased; }
  main { max-width: 48rem; margin: 0 auto; padding: 2.5rem 1.5rem; }

  header { display: flex; align-items: flex-start; gap: .75rem; margin-bottom: 2.5rem; }
  header svg { flex-shrink: 0; margin-top: 2px; color: var(--pear); }
  h1 { font-size: 2.25rem; margin: 0; letter-spacing: -.015em; font-weight: 600; line-height: 1.1; }
  .sub { color: var(--muted); margin: .25rem 0 0; font-size: .95rem; }

  .search-wrap { position: relative; }
  input.search, input.text, textarea.text {
    width: 100%; font-size: 1rem; padding: .75rem 1rem;
    border-radius: .375rem; border: 1px solid var(--border);
    background: var(--bg); color: var(--ink);
    outline: none; transition: border-color .15s, box-shadow .15s;
    font-family: inherit;
  }
  input.text { padding: .5rem .75rem; font-size: .875rem; }
  textarea.text { padding: .5rem .75rem; font-size: .875rem; resize: none; }
  input.search::placeholder, input.text::placeholder, textarea.text::placeholder { color: var(--muted); }
  input.search:focus, input.text:focus, textarea.text:focus {
    border-color: rgba(26, 127, 55, .6);
    box-shadow: 0 0 0 1px rgba(26, 127, 55, .4);
  }

  .dropdown {
    position: absolute; z-index: 20; left: 0; right: 0; top: 100%;
    margin-top: .25rem; background: var(--bg);
    border: 1px solid var(--border); border-radius: .375rem;
    box-shadow: 0 4px 16px rgba(15, 15, 15, .08);
    overflow: hidden;
  }
  .dropdown .header {
    padding: .5rem 1rem; font-size: .68rem; text-transform: uppercase;
    letter-spacing: .08em; color: var(--muted); background: var(--hover);
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center;
  }
  .dropdown .header .hint { text-transform: none; letter-spacing: normal; opacity: .8; }
  .dropdown ul { list-style: none; margin: 0; padding: 0; }
  .dropdown li {
    display: flex; justify-content: space-between; align-items: center;
    gap: .75rem; padding: .55rem 1rem; cursor: pointer; font-size: .875rem;
  }
  .dropdown li.hl { background: var(--hover); }
  .dropdown li .right { display: flex; gap: .5rem; align-items: center; }
  .dropdown .dots { font-size: .65rem; color: var(--muted); letter-spacing: -1px; }
  .dropdown .multi { font-size: .65rem; background: var(--selected);
    padding: .1rem .4rem; border-radius: 9999px; font-weight: 600; color: var(--ink); }

  .selected { display: flex; flex-wrap: wrap; gap: .375rem; align-items: center;
    margin: 1rem 0 2rem; min-height: 2rem; }
  .selected .empty { color: var(--muted); font-size: .875rem; }
  .chip {
    display: inline-flex; gap: .375rem; align-items: center;
    padding: .25rem .625rem; border-radius: .25rem;
    font-size: .85rem; cursor: pointer; border: none; transition: filter .15s;
  }
  .chip:hover { filter: brightness(.95); }
  .chip .x { opacity: .5; font-size: .75rem; }
  .chip:hover .x { opacity: 1; }
  .clearall, .save-combo, .saved-as {
    font-size: .75rem; background: none; border: none;
    cursor: pointer; padding: .25rem .5rem; border-radius: .25rem;
    transition: background .15s, color .15s;
  }
  .clearall { color: var(--muted); margin-left: .25rem; }
  .clearall:hover { color: var(--ink); background: var(--hover); }
  .save-combo { color: var(--pear); font-weight: 500; }
  .save-combo:hover { background: var(--hover); }
  .saved-as { color: var(--muted); cursor: default; }
  .saved-as strong { color: var(--ink); font-weight: 600; }

  .panel {
    background: var(--bg); border-radius: .375rem; border: 1px solid var(--border);
    padding: 1.5rem;
  }
  .panel h2 { font-size: 1.1rem; margin: 0 0 1rem; font-weight: 600; }
  .panel h2 .names { font-weight: 400; }
  .filterbar { display: flex; flex-wrap: wrap; gap: .25rem; margin-bottom: 1.25rem; }
  .fchip {
    font-size: .75rem; padding: .25rem .625rem; border-radius: .25rem;
    background: var(--hover); color: var(--muted); border: none; cursor: pointer; transition: all .15s;
  }
  .fchip:hover { color: var(--ink); }
  .fchip.active { background: var(--ink); color: var(--bg); }

  .group { margin-bottom: 1rem; }
  .group h3 {
    text-transform: uppercase; font-size: .68rem; letter-spacing: .08em;
    color: var(--muted); margin: 0 0 .375rem; font-weight: 500;
  }
  .group .row { display: flex; flex-wrap: wrap; gap: .375rem; }
  .pchip {
    padding: .25rem .625rem; border-radius: .25rem;
    font-size: .85rem; cursor: pointer; border: none;
    display: inline-flex; align-items: center; gap: .375rem; transition: filter .15s;
  }
  .pchip:hover { filter: brightness(.95); }
  .pchip .dots { font-size: .62rem; opacity: .55; letter-spacing: -1px; }
  .pchip .multi { font-size: .65rem; background: rgba(0,0,0,.08);
    padding: .05rem .375rem; border-radius: .25rem; font-weight: 600; }

  .empty-panel { text-align: center; color: var(--muted); padding: 2rem; }
  .empty-panel .big { font-size: 1rem; color: var(--ink); }
  .empty-panel .small { font-size: .875rem; margin-top: .25rem; }

  .saved-section { margin-top: 2.5rem; }
  .saved-section h2 {
    text-transform: uppercase; font-size: .68rem; letter-spacing: .08em;
    color: var(--muted); margin: 0 0 .5rem; font-weight: 500;
  }
  .combo-card {
    border: 1px solid var(--border); border-radius: .375rem; padding: .75rem;
    margin-bottom: .5rem; transition: background .15s; position: relative;
  }
  .combo-card:hover { background: var(--hover); }
  .combo-load {
    background: none; border: none; padding: 0; text-align: left;
    cursor: pointer; width: 100%; font: inherit; color: inherit;
  }
  .combo-card .name { font-weight: 500; font-size: .875rem; }
  .combo-card .count { font-size: .75rem; color: var(--muted); margin-left: .5rem; }
  .combo-card .about { font-size: .875rem; color: var(--muted); margin: .25rem 0 0; line-height: 1.4; }
  .combo-card .combo-chips { display: flex; flex-wrap: wrap; gap: .25rem; margin-top: .5rem; }
  .combo-card .combo-chips .cat-label { font-size: .65rem; padding: .05rem .375rem; border-radius: .25rem; }
  .combo-card .delete {
    position: absolute; top: .5rem; right: .5rem;
    background: none; border: none; cursor: pointer; padding: .15rem .4rem;
    border-radius: .25rem; font-size: .75rem; color: var(--muted);
    opacity: 0; transition: opacity .15s, color .15s;
  }
  .combo-card:hover .delete { opacity: 1; }
  .combo-card .delete:hover { color: var(--ink); }

  /* Modal */
  .overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.3);
    display: flex; align-items: center; justify-content: center;
    padding: 1rem; z-index: 50;
  }
  .modal {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: .5rem; max-width: 28rem; width: 100%; padding: 1.5rem;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, .25);
  }
  .modal h2 { font-size: 1rem; margin: 0 0 .25rem; font-weight: 600; }
  .modal .desc { font-size: .875rem; color: var(--muted); margin: 0 0 1rem; line-height: 1.4; }
  .modal label {
    display: block; font-size: .68rem; text-transform: uppercase;
    letter-spacing: .08em; color: var(--muted); margin-bottom: .25rem; font-weight: 500;
  }
  .modal label .opt { text-transform: none; letter-spacing: normal; opacity: .7; font-weight: normal; }
  .modal .ingredients-preview {
    display: flex; flex-wrap: wrap; gap: .25rem; margin-bottom: 1rem;
  }
  .modal .ingredients-preview .cat-label { font-size: .68rem; padding: .1rem .4rem; border-radius: .25rem; }
  .modal .field { margin-bottom: .75rem; }
  .modal .actions { display: flex; justify-content: flex-end; gap: .5rem; margin-top: 1rem; }
  .btn {
    font-size: .875rem; padding: .375rem .75rem; border-radius: .25rem;
    border: none; cursor: pointer; transition: filter .15s, background .15s, color .15s;
    font-family: inherit;
  }
  .btn-secondary { background: none; color: var(--muted); }
  .btn-secondary:hover { background: var(--hover); color: var(--ink); }
  .btn-primary { background: var(--pear); color: white; font-weight: 500; }
  .btn-primary:hover { filter: brightness(.95); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; }

  .muted { color: var(--muted); }
  .hidden { display: none; }
  footer { text-align: center; color: var(--muted); font-size: .75rem; margin-top: 4rem; }
  .cat-label { font-size: .68rem; padding: .1rem .4rem; border-radius: .25rem; }

  /* Notion-style category tags */
  .cat-fruit     { background: #FFE2DD; color: #5D1715; }
  .cat-vegetable { background: #DBEDDB; color: #1C3A1F; }

  .cat-grain     { background: #EEE0DA; color: #4D2E1F; }
  .cat-aromatic  { background: #E8DEEE; color: #3F2E5D; }
</style>

const STARTER_SLUGS = ["tomato","chicken","garlic","lemon","basil","onion","salmon","apple"];
const STORAGE_KEY = "flavor-pear:combos";

// --- mini repo (mirror of json-repository.ts) ---
const bySlug = new Map();
for (const ing of DATA.ingredients) bySlug.set(ing.slug, ing);

function summary(ing) {
  return { slug: ing.slug, name: ing.name, category: ing.category };
}
function search(q, limit = 8) {
  q = q.trim().toLowerCase();
  if (!q) return [];
  const scored = [];
  for (const ing of DATA.ingredients) {
    const name = ing.name.toLowerCase();
    const aliases = (ing.aliases || []).map(a => a.toLowerCase());
    let s = 0;
    if (name === q) s = 5;
    else if (name.startsWith(q)) s = 4;
    else if (aliases.some(a => a === q)) s = 4;
    else if (aliases.some(a => a.startsWith(q))) s = 3;
    else if (name.includes(q)) s = 2;
    else if (aliases.some(a => a.includes(q))) s = 1;
    if (s) scored.push({ ing, s });
  }
  scored.sort((a, b) => b.s - a.s || a.ing.name.localeCompare(b.ing.name));
  return scored.slice(0, limit).map(x => summary(x.ing));
}
function pairingsFor(slugs, limit = 60) {
  const sel = slugs.map(s => bySlug.get(s)).filter(Boolean);
  if (!sel.length) return [];
  const tally = new Map();
  const selSet = new Set(slugs);
  for (const ing of sel) {
    for (const p of ing.pairings || []) {
      if (selSet.has(p.slug)) continue;
      const cur = tally.get(p.slug) || { strengthSum: 0, hits: 0 };
      cur.strengthSum += p.strength;
      cur.hits += 1;
      tally.set(p.slug, cur);
    }
  }
  const results = [];
  for (const [slug, t] of tally) {
    const ing = bySlug.get(slug);
    const sm = ing ? summary(ing) : { slug, name: prettySlug(slug), category: "pantry" };
    results.push({
      ingredient: sm,
      score: t.strengthSum * (1 + (t.hits - 1) * 0.5),
      hits: t.hits,
      averageStrength: t.strengthSum / t.hits,
    });
  }
  results.sort((a, b) => b.score - a.score || b.hits - a.hits);
  return results.slice(0, limit);
}
function prettySlug(s) {
  return s.split("-").map(p => p[0].toUpperCase() + p.slice(1)).join(" ");
}
function getStarterSummaries(excludedSet) {
  return STARTER_SLUGS.map(s => bySlug.get(s)).filter(Boolean).map(summary)
    .filter(x => !excludedSet.has(x.slug));
}

// --- combo storage ---
function loadCombos() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return [];
    const arr = JSON.parse(raw);
    return Array.isArray(arr) ? arr : [];
  } catch { return []; }
}
function saveComboToStorage(combo) {
  const all = loadCombos();
  const created = {
    id: "c_" + Date.now() + "_" + Math.random().toString(36).slice(2,7),
    createdAt: Date.now(),
    ...combo,
  };
  all.unshift(created);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
  return created;
}
function deleteComboById(id) {
  const all = loadCombos().filter(c => c.id !== id);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
}
function findExactMatch(slugs) {
  const key = [...slugs].sort().join(",");
  return loadCombos().find(c =>
    [...c.ingredients.map(i => i.slug)].sort().join(",") === key
  ) || null;
}

  selected: [],
  items: [],
  mode: "starters",
  highlight: 0,
  open: false,
  filter: "all",
  comboModalOpen: false,
};

const qEl = document.getElementById("q");
const ddEl = document.getElementById("dropdown");

const savedListEl = document.getElementById("saved-list");
const modalRoot = document.getElementById("modal-root");

function selectedSlugs() { return state.selected.map(s => s.slug); }

function refreshDropdown() {
  const excludedSet = new Set(selectedSlugs());
  const q = qEl.value.trim();
  if (q) {
    state.items = search(q, 8).filter(r => !excludedSet.has(r.slug));
    state.mode = "search";
  } else if (state.selected.length === 0) {
    state.items = getStarterSummaries(excludedSet);
    state.mode = "starters";
  } else {
    const ranked = pairingsFor(selectedSlugs(), 10);
    state.items = ranked.map(p => ({
      slug: p.ingredient.slug, name: p.ingredient.name, category: p.ingredient.category,
      dots: Math.min(3, Math.round(p.averageStrength)),
      hits: p.hits,
    }));
    state.mode = "pairings";
  }
  state.highlight = 0;
  renderDropdown();
}

function renderDropdown() {
  if (!state.open || state.items.length === 0) {
    ddEl.classList.add("hidden");
    ddEl.innerHTML = "";
    return;
  }
  ddEl.classList.remove("hidden");
  const headerLabel =
    state.mode === "search" ? null
    : state.mode === "pairings" ? "Top pairings for your selection"
    : "Start with one of these";
  const header = headerLabel
    ? `<div class="header"><span>${headerLabel}</span><span class="hint">↵ to add · Esc to close</span></div>`
    : "";
  const items = state.items.map((r, i) => {
    const dots = r.dots !== undefined
      ? `<span class="dots">${"●".repeat(r.dots) + "○".repeat(3 - r.dots)}</span>`
      : "";
    const multi = (r.hits !== undefined && r.hits > 1)
      ? `<span class="multi">×${r.hits}</span>` : "";
    return `<li class="${i === state.highlight ? "hl" : ""}" data-i="${i}">
      <span>${escape(r.name)}</span>
      <span class="right">${dots}${multi}<span class="cat-label cat-${r.category}">${r.category}</span></span>
    </li>`;
  }).join("");
  ddEl.innerHTML = header + `<ul>${items}</ul>`;
  ddEl.querySelectorAll("li").forEach(li => {
    li.onmouseenter = () => { state.highlight = +li.dataset.i; renderDropdown(); };
    li.onmousedown = e => { e.preventDefault(); pick(state.items[+li.dataset.i]); };
  });
}

function renderSelected() {
  if (!state.selected.length) {
    selectedEl.innerHTML = `<span class="empty">Pick an ingredient to begin — the more you add, the smarter the suggestions.</span>`;
    return;
  }
  const chips = state.selected.map(s => `
    <button class="chip cat-${s.category}" data-slug="${s.slug}">
      <span>${escape(s.name)}</span><span class="x">×</span>
    </button>`).join("");
  const clearBtn = state.selected.length > 1
    ? `<button id="clear" class="clearall">clear all</button>` : "";

  let comboAction = "";
  if (state.selected.length >= 2) {
    const existing = findExactMatch(selectedSlugs());
    comboAction = existing
      ? `<span class="saved-as">Saved as <strong>${escape(existing.name)}</strong></span>`
      : `<button id="save-combo" class="save-combo" title="Save this combination so you can find it again">+ Save as combo</button>`;
  }
  selectedEl.innerHTML = chips + clearBtn + comboAction;

  selectedEl.querySelectorAll(".chip").forEach(b => {
    b.onclick = () => remove(b.dataset.slug);
  });
  const clr = document.getElementById("clear");
  if (clr) clr.onclick = () => { state.selected = []; renderAll(); };
  const save = document.getElementById("save-combo");
  if (save) save.onclick = () => openComboModal();
}

const CATS = ["herb","spice","vegetable","fruit","protein","dairy","pantry","nut","grain","aromatic"];

function renderPanel() {
  if (!state.selected.length) {
    panelEl.innerHTML = `
      <div class="empty-panel">
        <div class="big">Suggestions appear here</div>
        <div class="small">Add an ingredient and we'll show what pairs well.</div>
      </div>`;
    return;
  }
  const all = pairingsFor(selectedSlugs(), 60);
  const present = CATS.filter(c => all.some(p => p.ingredient.category === c));
  const filtered = state.filter === "all" ? all : all.filter(p => p.ingredient.category === state.filter);
  const grouped = new Map();
  for (const p of filtered) {
    if (!grouped.has(p.ingredient.category)) grouped.set(p.ingredient.category, []);
    grouped.get(p.ingredient.category).push(p);
  }

  const multi = state.selected.length > 1;
  const names = state.selected.map(s => s.name).join(" + ");
  const filterBar = present.length > 1
    ? `<div class="filterbar">
        <button class="fchip ${state.filter === "all" ? "active" : ""}" data-c="all">all</button>
        ${present.map(c => `<button class="fchip ${state.filter === c ? "active" : ""}" data-c="${c}">${c}</button>`).join("")}
      </div>` : "";

  const groups = Array.from(grouped.entries()).map(([cat, items]) => `
    <div class="group">
      <h3>${cat}</h3>
      <div class="row">
        ${items.map(p => {
          const dots = Math.min(3, Math.round(p.averageStrength));
          const dotStr = "●".repeat(dots) + "○".repeat(3 - dots);
          return `<button class="pchip cat-${p.ingredient.category}" data-slug="${p.ingredient.slug}"
                    title="${multi ? `Pairs with ${p.hits} of your selections` : `Affinity ${p.averageStrength.toFixed(1)}/3`}">
              <span>${escape(p.ingredient.name)}</span>
              <span class="dots">${dotStr}</span>
              ${multi && p.hits > 1 ? `<span class="multi">×${p.hits}</span>` : ""}
            </button>`;
        }).join("")}
      </div>
    </div>`).join("");

  panelEl.innerHTML = `
    <h2>Pairs well with <span class="names">${escape(names)}</span></h2>
    ${filterBar}
    ${all.length ? groups : `<p class="muted" style="font-size:.875rem;">No pairings yet.</p>`}
  `;
  panelEl.querySelectorAll(".fchip").forEach(b => {
    b.onclick = () => { state.filter = b.dataset.c; renderPanel(); };
  });
  panelEl.querySelectorAll(".pchip").forEach(b => {
    b.onclick = () => {
      const ing = bySlug.get(b.dataset.slug);
      if (ing) add(summary(ing));
    };
  });
}

      </button>
      <button class="delete" data-id="${c.id}">Delete</button>
    </div>
  `).join("");
  savedListEl.querySelectorAll(".combo-load").forEach(b => {
    b.onclick = () => {
      const c = loadCombos().find(x => x.id === b.dataset.id);
      if (c) { state.selected = c.ingredients.slice(); state.filter = "all"; renderAll(); }
    };
  });
  savedListEl.querySelectorAll(".delete").forEach(b => {
    b.onclick = e => {
      e.stopPropagation();
      deleteComboById(b.dataset.id);
      renderAll();
    };
  });
}

function openComboModal() {
  state.comboModalOpen = true;
  const existing = findExactMatch(selectedSlugs());
  const previewChips = state.selected.map(i =>
    `<span class="cat-label cat-${i.category}">${escape(i.name)}</span>`
  ).join("");

  const body = existing
    ? `<h2>This combo is already saved</h2>
       <p class="desc">You already saved this exact set as "${escape(existing.name)}".</p>
       <div class="ingredients-preview">${previewChips}</div>
       <div class="actions">
         <button class="btn btn-secondary" id="modal-close">Close</button>
       </div>`
    : `<h2>Name this combo</h2>
       <p class="desc">This combination is new to you. Give it a name (and optional notes) so you can find it again.</p>
       <div class="ingredients-preview">${previewChips}</div>
       <div class="field">
         <label>Name</label>
         <input id="combo-name" class="text" placeholder="e.g. Caprese, Apple-pork roast" autocomplete="off" />
       </div>
       <div class="field">
         <label>About <span class="opt">(optional)</span></label>
         <textarea id="combo-about" class="text" rows="3" placeholder="What is this combo? Why does it work? When do you cook it?"></textarea>
       </div>
       <div class="actions">
         <button class="btn btn-secondary" id="modal-close">Cancel</button>
         <button class="btn btn-primary" id="modal-save" disabled>Save combo</button>
       </div>`;

  modalRoot.innerHTML = `<div class="overlay" id="overlay"><div class="modal">${body}</div></div>`;
  document.getElementById("overlay").onclick = e => {
    if (e.target.id === "overlay") closeComboModal();
  };
  document.getElementById("modal-close").onclick = closeComboModal;
  if (!existing) {
    const nameInput = document.getElementById("combo-name");
    const aboutInput = document.getElementById("combo-about");
    const saveBtn = document.getElementById("modal-save");
    nameInput.focus();
    nameInput.oninput = () => { saveBtn.disabled = !nameInput.value.trim(); };
    nameInput.onkeydown = e => { if (e.key === "Enter") saveBtn.click(); };
    saveBtn.onclick = () => {
      if (!nameInput.value.trim()) return;
      saveComboToStorage({
        name: nameInput.value.trim(),
        about: aboutInput.value.trim(),
        ingredients: state.selected.slice(),
      });
      closeComboModal();
      renderAll();
    };
  }
}

function closeComboModal() {
  state.comboModalOpen = false;
  modalRoot.innerHTML = "";
}

function renderAll() { refreshDropdown(); renderSelected(); renderPanel(); renderSaved(); }

function add(ing) {
  if (state.selected.some(s => s.slug === ing.slug)) return;
  state.selected.push(ing);
  qEl.value = "";
  state.filter = "all";
  state.open = true;
  state.items = []; // clear stale items so dropdown doesn't flash old result
  renderAll();
  qEl.focus();
}
function remove(slug) {
  state.selected = state.selected.filter(s => s.slug !== slug);
  renderAll();
}
function pick(r) { add(r); }

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"
  }[c]));
}

let t = null;
qEl.addEventListener("input", () => {
  clearTimeout(t);
  t = setTimeout(() => { state.open = true; refreshDropdown(); }, 50);
});
qEl.addEventListener("keydown", e => {
  if (e.key === "ArrowDown") {
    e.preventDefault();
    if (state.items.length === 0) return;
    state.highlight = (state.highlight + 1) % state.items.length;
    state.open = true; renderDropdown();
  } else if (e.key === "ArrowUp") {
    e.preventDefault();
    if (state.items.length === 0) return;
    state.highlight = (state.highlight - 1 + state.items.length) % state.items.length;
    renderDropdown();
  } else if (e.key === "Enter") {
    if (state.items[state.highlight]) { e.preventDefault(); pick(state.items[state.highlight]); }
  } else if (e.key === "Escape") {
    if (state.comboModalOpen) closeComboModal();
    else { state.open = false; renderDropdown(); }
  }
});
qEl.addEventListener("focus", () => { state.open = true; refreshDropdown(); });
qEl.addEventListener("blur", () => setTimeout(() => { state.open = false; renderDropdown(); }, 150));

renderAll();
</script>
</body>
</html>
